<div class="poem">
  <h1>In time II</h1>
  
  <div class="post--content">
    <p>The periphery flickers<br>
and a wasp waits ahead;<br>
I am here, covered in sticky threads,<br>
pulled by the clock&rsquo;s thin, dark hands.</p>
